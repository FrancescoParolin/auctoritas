<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none">
  <!-- Left diagonal leg of A (widens toward base like a column) -->
  <path d="M100 12 L58 108 L72 108 L100 36 Z" fill="#c8901e"/>
  <!-- Right diagonal leg of A -->
  <path d="M100 12 L142 108 L128 108 L100 36 Z" fill="#c8901e"/>

  <!-- Column capital top bar -->
  <rect x="50" y="108" width="100" height="6" rx="1" fill="#c8901e"/>

  <!-- Capital volutes / ionic curves (left) -->
  <path d="M50 114 Q44 120 50 126 L64 126 L64 114 Z" fill="#c8901e"/>
  <!-- Capital volutes / ionic curves (right) -->
  <path d="M150 114 Q156 120 150 126 L136 126 L136 114 Z" fill="#c8901e"/>
  <!-- Capital middle fill -->
  <rect x="64" y="114" width="72" height="12" fill="#c8901e"/>

  <!-- Column shaft vertical lines (fluting) — 5 flutes -->
  <rect x="70" y="128" width="7" height="44" fill="#c8901e"/>
  <rect x="82" y="128" width="7" height="44" fill="#c8901e"/>
  <rect x="96" y="128" width="8" height="44" fill="#c8901e"/>
  <rect x="111" y="128" width="7" height="44" fill="#c8901e"/>
  <rect x="123" y="128" width="7" height="44" fill="#c8901e"/>

  <!-- Base architrave -->
  <rect x="54" y="172" width="92" height="6" rx="1" fill="#c8901e"/>
  <rect x="46" y="178" width="108" height="5" rx="1" fill="#c8901e"/>
</svg>
